immich_api_key: "NOTSET"

immich_nfs_options: "(rw,sync,no_subtree_check,no_root_squash)"
immich_nfs_allowedclients: "1.2.3.4"

# These should be overriden from your site's group_vars/all.yml
service_data: "fixme"
service_db: "fixmetoo"
service_name: "forgottooverride"